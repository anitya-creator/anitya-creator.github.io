<!DOCTYPE html>
<html>

<head>
<title>Create Account</title>
<style>

body{
margin:0;
font-family:sans-serif;
background:#0f172a;
color:white;

display:flex;
justify-content:center;
align-items:center;

height:100vh;
}

.container{

background:rgba(255,255,255,0.05);
padding:40px;

border-radius:10px;

backdrop-filter:blur(10px);

width:300px;
}

input{

width:100%;
padding:10px;
margin:10px 0;

border:none;
border-radius:5px;
}

button{

width:100%;
padding:10px;

background:#3b82f6;
border:none;
color:white;

border-radius:5px;
cursor:pointer;
}

</style>
</head>

<body>

<div class="container">

<h2>Create Account</h2>

<input type="text" placeholder="Username">

<input type="email" placeholder="Email">

<input type="password" placeholder="Password">

<button>Create</button>

</div>

</body>

</html>
