<!DOCTYPE html>

<html>


<head>
<title>Wheel</title>
<style>
body{
margin: 0;
}

.New{
height: 100vh;
background-image: url("https://wallpaperaccess.com/full/9016858.jpg");
background-size: cover;
display: flex;
justify-content: center;
align-items: center;
flex-direction: column;
}

h1{
font-size: 70px;
text-shadow:2px 2px 10px black;
animation: fadeIn 3s ease;
}
p{
font-size: 20px;
text-shadow:2px 2px 10px black;

opacity: 0;

animation: fadeInn 1.8s ease;
animation-delay: 2s;
animation-fill-mode: forwards;
}

.ninja{
position:absolute;
top:10px;
left:20px;

width: 100px;
height: 82px;

background-image: url("ChatGPT_Image_Mar_9__2026__01_11_08_AM-removebg-preview.png");
background-repeat: no-repeat;

cursor:pointer;
}
.slash{
animation: slash 0.8s steps(6);
}
.menu{
position:absolute;
top:40px;
left:160px;

display:flex;
gap:15px;
}

.menu{
position:absolute;
top:40px;
left:170px;

display:flex;
gap:45px;   /* more spacing */
}

.menu-btn{
transition:all 0.4s ease;
opacity:0;
transform:translateX(-20px);

padding:12px 26px;

font-size:16px;
letter-spacing:1px;

border-radius:30px;
border:1px solid rgba(255,255,255,0.4);

background:rgba(255,255,255,0.12);
backdrop-filter:blur(8px);

color:white;

cursor:pointer;

transition:all 0.35s ease;
}


.menu-btn:hover{

background:rgba(255,255,255,0.25);

transform:translateY(-3px);

box-shadow:0 6px 20px rgba(255,255,255,0.3);

}

.menu-btn.show{
opacity:1;
transform:translateX(0);
}
.logo{
position:absolute;

top:25px;
right:20px;

width:200px;   /* adjust size */
height:100;

z-index:10;
}
    .dropdown{
position:relative;
}

.dropdown-content{

position:absolute;
top:50px;

display:flex;
flex-direction:column;
gap:8px;

opacity:0;
transform:translateY(-10px);

background:rgba(20,20,40,0.8);
backdrop-filter:blur(6px);

padding:10px;
border-radius:10px;

transition:0.3s;
}

.dropdown-content a{

color:white;
text-decoration:none;

padding:8px 14px;
border-radius:6px;

transition:0.2s;
}

.dropdown-content a:hover{
background:rgba(255,255,255,0.2);
}

.dropdown:hover .dropdown-content{
opacity:1;
transform:translateY(0);
}
    .signup-panel{

position:fixed;
top:0;
left:0;

width:100%;
height:100%;

display:flex;
justify-content:center;
align-items:center;

background:rgba(0,0,0,0.6);

opacity:0;
pointer-events:none;

transition:0.4s;
}

.signup-panel.show{

opacity:1;
pointer-events:auto;

}

.signup-box{

background:rgba(255,255,255,0.08);
backdrop-filter:blur(10px);

padding:40px;
border-radius:12px;

display:flex;
flex-direction:column;

gap:12px;

width:320px;
}

.signup-box input{

padding:10px;
border:none;
border-radius:6px;
}

.signup-box button{

padding:10px;
border:none;
border-radius:6px;

background:#4f46e5;
color:white;

cursor:pointer;
}

.close-btn{

background:#ef4444;

}

@keyframes slash{
from{
background-position: 0px 0px;
}
to{
background-position:-612px 0px;
}
}

@keyframes fadeInn{
from{
opacity: 0;
transform: translateY(-10px);
}
to{
opacity: 1;
transform: translateY(0);
}
}

@keyframes fadeIn{
from{
opacity: 0;
transform: translateY(-30px);
}
to{
opacity: 1;
transform: translateY(0);
}
}

</style>
</head>

<body>
    <img src="AWHEEL-removebg-preview.png" class="logo">
<div class="New">

<div class="ninja" id="ninja"></div>
<div class="menu">
    <div class="signup-panel" id="signupPanel">

<div class="signup-box">

<h2>Create Account</h2>

<input type="text" placeholder="Username">
<input type="email" placeholder="Email">
<input type="password" placeholder="Password">

<button>Create</button>
<button class="close-btn" id="closePanel">Close</button>

</div>

</div>

<div class="dropdown">
<button class="menu-btn">Get Started</button>
<div class="dropdown-content">
<a href="#" id="openSignup">Create Account</a>
<a href="#">Login</a>
<a href="#">Tutorial</a>
</div>
</div>

<div class="dropdown">
<button class="menu-btn">Explore Worlds</button>
<div class="dropdown-content">
<a href="#">Fantasy World</a>
<a href="#">Sci-Fi World</a>
<a href="#">Adventure World</a>
</div>
</div>

<div class="dropdown">
<button class="menu-btn">Learn More</button>
<div class="dropdown-content">
<a href="#">About Us</a>
<a href="#">How It Works</a>
<a href="#">Technology</a>
</div>
</div>

<div class="dropdown">
<button class="menu-btn">Contact Us</button>
<div class="dropdown-content">
<a href="#">Email</a>
<a href="#">Discord</a>
<a href="#">Support</a>
</div>
</div>

</div>
<h1 style="color: white">Dream Worlds</h1>
<p style="color: white">Enter the realm beyond imagination</p>

</div>
<script>

const ninja = document.getElementById("ninja");
const buttons = document.querySelectorAll(".menu-btn");

let open = false;

ninja.addEventListener("click", () => {

ninja.classList.remove("slash");
void ninja.offsetWidth;
ninja.classList.add("slash");

if(!open){

buttons.forEach((btn,index)=>{
setTimeout(()=>{
btn.classList.add("show");
}, index*200);
});

open = true;

}else{

buttons.forEach((btn,index)=>{
setTimeout(()=>{
btn.classList.remove("show");
}, index*200);
});

open = false;

}

});
    const openSignup = document.getElementById("openSignup");
const signupPanel = document.getElementById("signupPanel");
const closePanel = document.getElementById("closePanel");

openSignup.addEventListener("click", (e) => {

e.preventDefault();
signupPanel.classList.add("show");

});

closePanel.addEventListener("click", () => {

signupPanel.classList.remove("show");

});
</script>
</body>



</html>
